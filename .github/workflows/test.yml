name: Test Action

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download llint
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --repo lunar-linux/lunar-tools --limit 1 --json tagName --jq '.[0].tagName')
          asset="llint-${tag}-linux-amd64.tar.xz"
          gh release download "$tag" \
            --repo lunar-linux/lunar-tools \
            --pattern "$asset" \
            --dir /tmp
          tar xJf "/tmp/${asset}" -C /tmp
          mv "/tmp/llint-${tag}-linux-amd64/llint-linux-amd64" /tmp/llint
          chmod +x /tmp/llint

      - name: Run tests
        run: ./tests/test.sh /tmp/llint
